<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 820" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#0078D4"/>
    </marker>
    <marker id="arrow-right" markerWidth="7" markerHeight="10" refX="0" refY="5" orient="auto">
      <polygon points="0 0, 7 5, 0 10" fill="#0078D4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="820" rx="12" fill="#F9F9F9"/>

  <!-- Title -->
  <text x="390" y="30" font-size="16" font-weight="700" fill="#243A5E" text-anchor="middle">Agentic Architecture — Four-Phase Pipeline</text>

  <!-- ===== PA Request ===== -->
  <rect x="290" y="50" width="200" height="50" rx="25" fill="#0078D4" filter="url(#shadow)"/>
  <text x="390" y="80" font-size="14" font-weight="600" fill="white" text-anchor="middle">PA Request (Frontend)</text>

  <!-- Arrow down -->
  <line x1="390" y1="100" x2="390" y2="130" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Pre-flight ===== -->
  <rect x="270" y="135" width="240" height="60" rx="10" fill="#3B5998" filter="url(#shadow)"/>
  <text x="390" y="160" font-size="13" font-weight="700" fill="white" text-anchor="middle">Pre-flight Validation</text>
  <text x="390" y="180" font-size="11" fill="#B0C4DE" text-anchor="middle">CPT/HCPCS format check</text>

  <!-- Arrow down -->
  <line x1="390" y1="195" x2="390" y2="225" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Phase 1 container ===== -->
  <rect x="60" y="230" width="660" height="160" rx="10" fill="#EDE8F5" filter="url(#shadow)"/>
  <rect x="60" y="230" width="660" height="32" rx="10" fill="#8661C5"/>
  <rect x="60" y="250" width="660" height="12" fill="#8661C5"/>
  <text x="390" y="253" font-size="13" font-weight="700" fill="white" text-anchor="middle">PHASE 1 — PARALLEL (asyncio.gather)</text>

  <!-- Compliance Agent -->
  <rect x="90" y="275" width="280" height="100" rx="8" fill="white" stroke="#8661C5" stroke-width="2"/>
  <rect x="90" y="275" width="280" height="28" rx="8" fill="#8661C5"/>
  <rect x="90" y="295" width="280" height="8" fill="#8661C5"/>
  <text x="230" y="296" font-size="12" font-weight="700" fill="white" text-anchor="middle">Compliance Agent</text>
  <text x="110" y="325" font-size="11" fill="#333">✓ 8-item documentation checklist</text>
  <text x="110" y="343" font-size="11" fill="#333">✓ Patient demographics validation</text>
  <text x="110" y="361" font-size="11" fill="#333">✓ Clinical notes quality assessment</text>
  <text x="300" y="370" font-size="9" fill="#8661C5" text-anchor="middle">no tools</text>

  <!-- Clinical Reviewer Agent -->
  <rect x="410" y="275" width="280" height="100" rx="8" fill="white" stroke="#8661C5" stroke-width="2"/>
  <rect x="410" y="275" width="280" height="28" rx="8" fill="#8661C5"/>
  <rect x="410" y="295" width="280" height="8" fill="#8661C5"/>
  <text x="550" y="296" font-size="12" font-weight="700" fill="white" text-anchor="middle">Clinical Reviewer Agent</text>
  <text x="430" y="325" font-size="11" fill="#333">✓ ICD-10 code validation</text>
  <text x="430" y="343" font-size="11" fill="#333">✓ Clinical data extraction</text>
  <text x="430" y="361" font-size="11" fill="#333">✓ Literature + trials search</text>

  <!-- MCP badges for Clinical -->
  <rect x="430" y="367" width="60" height="16" rx="3" fill="#107C10"/>
  <text x="460" y="379" font-size="8" fill="white" text-anchor="middle">icd10</text>
  <rect x="496" y="367" width="60" height="16" rx="3" fill="#107C10"/>
  <text x="526" y="379" font-size="8" fill="white" text-anchor="middle">pubmed</text>
  <rect x="562" y="367" width="60" height="16" rx="3" fill="#107C10"/>
  <text x="592" y="379" font-size="8" fill="white" text-anchor="middle">trials</text>

  <!-- Parallel indicator -->
  <text x="388" y="340" font-size="22" fill="#8661C5" text-anchor="middle">⇅</text>

  <!-- Arrow down -->
  <line x1="390" y1="390" x2="390" y2="420" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Phase 2 container ===== -->
  <rect x="160" y="425" width="460" height="110" rx="10" fill="#EDE8F5" filter="url(#shadow)"/>
  <rect x="160" y="425" width="460" height="32" rx="10" fill="#8661C5"/>
  <rect x="160" y="445" width="460" height="12" fill="#8661C5"/>
  <text x="390" y="448" font-size="13" font-weight="700" fill="white" text-anchor="middle">PHASE 2 — SEQUENTIAL (needs clinical findings)</text>

  <!-- Coverage Agent -->
  <rect x="190" y="470" width="400" height="52" rx="8" fill="white" stroke="#8661C5" stroke-width="2"/>
  <text x="390" y="492" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Coverage Agent</text>
  <text x="390" y="510" font-size="10" fill="#666" text-anchor="middle">Provider verify · Policy search · Criteria mapping (MET / NOT_MET / INSUFFICIENT)</text>

  <!-- MCP badges for Coverage -->
  <rect x="500" y="475" width="40" height="14" rx="3" fill="#107C10"/>
  <text x="520" y="486" font-size="7" fill="white" text-anchor="middle">npi</text>
  <rect x="545" y="475" width="40" height="14" rx="3" fill="#107C10"/>
  <text x="565" y="486" font-size="7" fill="white" text-anchor="middle">cms</text>

  <!-- Arrow down -->
  <line x1="390" y1="535" x2="390" y2="565" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Phase 3 — Synthesis ===== -->
  <rect x="180" y="570" width="420" height="90" rx="10" fill="#243A5E" filter="url(#shadow)"/>
  <text x="390" y="595" font-size="13" font-weight="700" fill="#50E6FF" text-anchor="middle">PHASE 3 — SYNTHESIS</text>

  <!-- Gates -->
  <rect x="200" y="608" width="115" height="38" rx="6" fill="#3B5998"/>
  <text x="257" y="623" font-size="10" font-weight="600" fill="white" text-anchor="middle">Gate 1</text>
  <text x="257" y="638" font-size="9" fill="#B0C4DE" text-anchor="middle">Provider Valid?</text>

  <text x="325" y="630" font-size="16" fill="#50E6FF" text-anchor="middle">→</text>

  <rect x="340" y="608" width="115" height="38" rx="6" fill="#3B5998"/>
  <text x="397" y="623" font-size="10" font-weight="600" fill="white" text-anchor="middle">Gate 2</text>
  <text x="397" y="638" font-size="9" fill="#B0C4DE" text-anchor="middle">Codes Valid?</text>

  <text x="465" y="630" font-size="16" fill="#50E6FF" text-anchor="middle">→</text>

  <rect x="475" y="608" width="115" height="38" rx="6" fill="#3B5998"/>
  <text x="532" y="623" font-size="10" font-weight="600" fill="white" text-anchor="middle">Gate 3</text>
  <text x="532" y="638" font-size="9" fill="#B0C4DE" text-anchor="middle">Med. Necessity?</text>

  <!-- Arrow down -->
  <line x1="390" y1="660" x2="390" y2="690" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Phase 4 — Audit ===== -->
  <rect x="220" y="695" width="340" height="55" rx="10" fill="#004B1C" filter="url(#shadow)"/>
  <text x="390" y="718" font-size="13" font-weight="700" fill="#92E89D" text-anchor="middle">PHASE 4 — AUDIT TRAIL</text>
  <text x="390" y="738" font-size="10" fill="#D4F0D4" text-anchor="middle">Confidence calc · 8-section audit document (MD + PDF)</text>

  <!-- Arrow down -->
  <line x1="390" y1="750" x2="390" y2="775" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Decision Panel ===== -->
  <rect x="260" y="780" width="260" height="30" rx="15" fill="#D83B01" filter="url(#shadow)"/>
  <text x="390" y="801" font-size="12" font-weight="700" fill="white" text-anchor="middle">Decision Panel → Accept / Override → PDF</text>

  <!-- Legend -->
  <rect x="20" y="50" width="12" height="12" rx="2" fill="#8661C5"/>
  <text x="38" y="61" font-size="10" fill="#333">AI Agent</text>
  <rect x="20" y="70" width="12" height="12" rx="2" fill="#107C10"/>
  <text x="38" y="81" font-size="10" fill="#333">MCP Server</text>
  <rect x="20" y="90" width="12" height="12" rx="2" fill="#243A5E"/>
  <text x="38" y="101" font-size="10" fill="#333">Orchestrator</text>
  <rect x="20" y="110" width="12" height="12" rx="2" fill="#D83B01"/>
  <text x="38" y="121" font-size="10" fill="#333">Human-in-the-loop</text>
</svg>
